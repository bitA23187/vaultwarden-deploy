# =============================================================================
# fail2ban jail for Vaultwarden
# 部署路径: /etc/fail2ban/jail.d/vaultwarden.conf
# =============================================================================
[vaultwarden]
enabled  = true
port     = 8443
filter   = vaultwarden
logpath  = /opt/vaultwarden/data/vaultwarden.log
backend  = auto
banaction = ufw

# 10 分钟内失败 5 次 → 封禁 1 小时
maxretry = 5
bantime  = 3600
findtime = 600
