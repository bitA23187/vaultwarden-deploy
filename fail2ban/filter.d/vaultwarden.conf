# =============================================================================
# fail2ban filter for Vaultwarden
# 部署路径: /etc/fail2ban/filter.d/vaultwarden.conf
# =============================================================================
[Definition]
failregex = ^.*Username or password is incorrect\. Try again\. IP: <HOST>\. Username:.*$
            ^.*Invalid admin token\. IP: <HOST>.*$
ignoreregex =
