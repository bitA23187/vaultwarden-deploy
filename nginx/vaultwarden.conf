# Rate limiting zones
# 主应用：每分钟 10 个请求，burst 允许 20
limit_req_zone $binary_remote_addr zone=vw_limit:10m rate=10r/m;
# Admin 面板：每分钟 5 个请求，burst 允许 3
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/m;

server {
    listen 8443 ssl;
    http2 on;
    server_name vault.yourdomain.com;

    server_tokens off;
    client_max_body_size 128M;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # 仅允许 TLS 1.2 / 1.3
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:CHACHA20;
    ssl_prefer_server_ciphers off;

    # Session 复用
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # -------------------------------------------------------------------------
    # Admin 面板访问策略
    # 默认读取禁用规则（404），仅维护窗口切换为 enabled 模板。
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/_admin-location.inc;

    # -------------------------------------------------------------------------
    # WebSocket — 推送通知（实时同步）
    # -------------------------------------------------------------------------
    location /notifications/hub {
        proxy_pass         http://vaultwarden:3012;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          "upgrade";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;
        proxy_read_timeout 300s;
    }

    # -------------------------------------------------------------------------
    # 主应用
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=vw_limit burst=20 nodelay;

        proxy_pass         http://vaultwarden:80;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/vw_access.log;
    error_log  /var/log/nginx/vw_error.log warn;
}
